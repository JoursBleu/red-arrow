name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Tap on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. Pixel 7, Xiaomi 14"
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: "e.g. Android 14"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Copy logs from the Log card in the app.
      render: shell
